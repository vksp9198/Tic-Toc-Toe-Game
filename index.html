<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic-Toc-Toe Game</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <!-- <h1>Tic-Toc-Toe Game</h1> -->
        <div class="container">
            <!-- <div class="upper-body"> -->
            <div class="spans">
                <span class="cross">X</span><span class="circle">O</span>
                <span class="boxe"><span class="variable">X</span> TURN</span>
                <span class="ties">@</span>
            </div>
            <div class="nine-box">
                <div class="boxes"></div>
                <div class="boxes"></div>
                <div class="boxes"></div>
                <div class="boxes"></div>
                <div class="boxes"></div>
                <div class="boxes"></div>
                <div class="boxes"></div>
                <div class="boxes"></div>
                <div class="boxes"></div>
            </div>
            <div class="result">
                <div class="results" id="you">X (YOU)
                    <p>18</p>
                </div>
                <div class="results" id="ties">Ties
                    <p>32</p>
                </div>
                <div class="results" id="comp">O(COMP)
                    <p>20</p>
                </div>
            </div>
            <!-- </div> -->
        </div>
    </body>

</html>
